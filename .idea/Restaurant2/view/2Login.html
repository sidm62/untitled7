<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Restaurant-guide - Register</title>
    <link rel="stylesheet" href="../2restaurant.css">
    <script src="../controller/2login.js" type="module" defer></script>
</head>
<body>

<header>//
    <h1>CAMPUS<span>EATS</span></h1>
    <p> Syotä tunnus ja kirjaudu sisään</p>
</header>
<main>
    <section id="login-section">
        <h2>Kirjaudu sisään</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="username">Käyttäjätunnus</label>
                <input type="text" id="username" name="username" required minlength="3">
            </div>
            <div class="form-group">
                <label for="password">Salasana</label>
                <input type="password" id="password" name="password" required>
            </div>

            <button type="submit" id="login-submit">Kirjaudu</button>
        </form>
    </section>
</main>

</body>
</html>
